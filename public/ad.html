<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ad</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
    }
  </style>
</head>
<body>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    
    // We only use ad.html for Banners now, Native is handled in React.
    const adKey = urlParams.get('key');
    const adWidth = urlParams.get('width');
    const adHeight = urlParams.get('height');
    
    window.atOptions = {
      'key' : adKey,
      'format' : 'iframe',
      'height' : parseInt(adHeight),
      'width' : parseInt(adWidth),
      'params' : {}
    };
    
    document.write('<script src="https://www.highperformanceformat.com/' + adKey + '/invoke.js"><\\/script>');
  </script>

  <script>
    // Continuously check if the ad has rendered something
    let checks = 0;
    const interval = setInterval(() => {
      const iframes = document.getElementsByTagName('iframe');
      // If Adsterra injected an iframe, it means the ad loaded
      if (iframes.length > 0) {
        window.parent.postMessage({ type: 'AD_LOADED', key: adKey }, '*');
        clearInterval(interval);
      }
      
      checks++;
      if (checks > 10) { // Give up after 5 seconds
        clearInterval(interval);
      }
    }, 500);
  </script>
</body>
</html>
